<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Intents Demo</title>
<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    max-width: 640px;
    margin: 40px auto;
    padding: 0 20px;
    background: #fafafa;
  }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .subtitle { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.85rem; }
  input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95rem; }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0; }
  button { padding: 10px 18px; border: 1px solid #333; border-radius: 4px; font-size: 0.9rem; cursor: pointer; background: #333; color: #fff; }
  button.secondary { background: #fff; color: #333; }
  .uri-display { background: #f0f0f0; padding: 10px; border-radius: 4px; font-family: monospace; word-break: break-all; margin: 12px 0; font-size: 0.85rem; }
  .app-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .app-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid #ddd; border-radius: 6px; text-decoration: none; color: #333; background: #fff; font-size: 0.9rem; }
  .app-btn:hover { border-color: #666; }
  .app-btn img { width: 20px; height: 20px; }
  .qr-section { margin-top: 20px; text-align: center; padding: 20px; border: 1px solid #eee; border-radius: 8px; background: #fff; }
  .error-msg { background: #fdd; border: 1px solid #eaa; color: #a33; padding: 12px; border-radius: 4px; }
  .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
  .badge-ok { background: #161; color: #fff; }
  .badge-cm { background: #eee; color: #555; }
</style>
</head>
<body>

<h1>UPI Intents Library Demo</h1>
<p class="subtitle">Real library import — no mocks. Edit the form and generate links.</p>

<div class="form-group">
  <label for="pa">Payee VPA</label>
  <input type="text" id="pa" value="demo@upi" placeholder="merchant@paytm">
</div>
<div class="form-group">
  <label for="pn">Payee Name</label>
  <input type="text" id="pn" value="Demo Merchant">
</div>
<div class="form-group">
  <label for="am">Amount (INR)</label>
  <input type="number" id="am" value="99.50" placeholder="100.00">
</div>
<div class="form-group">
  <label for="tn">Transaction Note</label>
  <input type="text" id="tn" value="Test payment">
</div>

<div class="btn-group">
  <button onclick="generate('pay')">Generate Payment Links</button>
  <button onclick="generate('mandate')">Generate Mandate Links</button>
  <button class="secondary" onclick="clearAll()">Clear</button>
</div>

<div id="results"></div>

<script type="module">
import {
  createPaymentUri,
  createMandateUri,
  buildAppLink,
  detectPlatform,
  generateQRCode,
  generateQRCanvas,
} from '../../dist/index.js';

const APPS_TO_SHOW = ['gpay', 'phonepe', 'paytm', 'bhim', 'amazonpay', 'cred', 'whatsapp', 'generic'];
const APP_DOMAINS = {
  gpay: 'pay.google.com', phonepe: 'phonepe.com', paytm: 'paytm.com',
  bhim: 'bhimupi.org.in', amazonpay: 'amazon.in', cred: 'cred.club',
  whatsapp: 'whatsapp.com', generic: 'npci.org.in',
};

window.generate = function(action) {
  const pa = document.getElementById('pa').value.trim();
  const pn = document.getElementById('pn').value.trim();
  const am = document.getElementById('am').value.trim();
  const tn = document.getElementById('tn').value.trim();
  const results = document.getElementById('results');

  if (!pa || !pn) {
    results.innerHTML = '<div class="error-msg">Payee VPA and Name are required.</div>';
    return;
  }

  let uri;
  try {
    uri = action === 'pay'
      ? createPaymentUri(pa, pn, am, tn)
      : createMandateUri(pa, pn, am, tn, 'MANDATE-' + Date.now());
  } catch (e) {
    results.innerHTML = `<div class="error-msg">${e.message}</div>`;
    return;
  }

  const platform = detectPlatform();
  let html = `<div class="uri-display">${uri}</div>`;
  html += `<p style="font-size:0.8rem;color:#666;margin-bottom:8px;">Platform: ${platform.toUpperCase()} &middot; Action: ${action.toUpperCase()}</p>`;
  html += '<div class="app-list">';

  for (const appId of APPS_TO_SHOW) {
    const link = buildAppLink({ appId, upiUri: uri, platform });
    const domain = APP_DOMAINS[appId] || '';
    const favicon = domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=64` : '';
    const badge = link.app.verified
      ? '<span class="badge badge-ok">VERIFIED</span>'
      : '<span class="badge badge-cm">COMMUNITY</span>';
    html += `<a class="app-btn" href="${escapeAttr(link.url)}" target="_blank" rel="noopener">
      ${favicon ? `<img src="${favicon}" alt="" width="20" height="20" onerror="this.remove()">` : ''}
      ${link.app.label} ${badge}
    </a>`;
  }
  html += '</div>';

  // QR Code
  html += '<div class="qr-section"><strong>QR Code (Desktop fallback)</strong><div id="qr"></div></div>';
  results.innerHTML = html;

  // Render QR
  const qrDiv = document.getElementById('qr');
  try {
    const qr = generateQRCode(uri, { size: 150 });
    if (qr.svg && qr.svg.length > 0) {
      qrDiv.innerHTML = qr.svg;
    } else {
      const canvas = generateQRCanvas(uri, { size: 150 });
      if (canvas) {
        const img = document.createElement('img');
        img.src = canvas.toDataURL('image/png');
        img.width = 150; img.height = 150;
        qrDiv.appendChild(img);
      }
    }
  } catch (e) {
    qrDiv.textContent = 'QR unavailable';
  }
};

window.clearAll = function() {
  document.getElementById('results').innerHTML = '';
};

function escapeAttr(s) { return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// Auto-generate on load
window.generate('pay');
</script>
</body>
</html>
